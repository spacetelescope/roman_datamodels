%YAML 1.1
---
$schema: asdf://stsci.edu/datamodels/roman/schemas/rad_schema-1.1.0
id: asdf://stsci.edu/datamodels/roman/schemas/SSC/MSOS/keywords/msos_exposure-1.0.0

title: Exposure Information for Reference Stack and Catalogs
extName: SSC

type: object
properties:
  exptime:
    title: Exposure Time
    description: Effective (total) exposure time (seconds)
    type: number
    archive_catalog:
      datatype: float
      destination: [WFIMSOSReferenceFrame.exptime, WFIMSOSCatalog.exptime]
  expstart:
    title: Start Time
    description: Start time of first observation/light curve (UTC)
    allOf:
      - $ref: http://stsci.edu/schemas/asdf/time/time-1.3.0#/definitions/iso_time
    archive_catalog:
      datatype: datetime2
      destination: [WFIMSOSReferenceFrame.expstart, WFIMSOSCatalog.expstart]
  expend:
    title: End Time
    description: End time of last observation/light curve (UTC)
    allOf:
      - $ref: http://stsci.edu/schemas/asdf/time/time-1.3.0#/definitions/iso_time
    archive_catalog:
      datatype: datetime2
      destination: [WFIMSOSReferenceFrame.expend, WFIMSOSCatalog.expend]
  expstart_mjd:
    title: Start Time MJD
    description: Start time of first observation/light curve (MJD)
    type: number
    archive_catalog:
      datatype: float
      destination:
        [WFIMSOSReferenceFrame.expstart_mjd, WFIMSOSCatalog.expstart_mjd]
  expend_mjd:
    title: End Time MJD
    description: End time of last observation/light curve (MJD)
    type: number
    archive_catalog:
      datatype: float
      destination: [WFIMSOSReferenceFrame.expend_mjd, WFIMSOSCatalog.expend_mjd]

required: [exptime, expstart, expend, expstart_mjd, expend_mjd]
