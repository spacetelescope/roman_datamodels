%YAML 1.1
---
$schema: asdf://stsci.edu/datamodels/roman/schemas/rad_schema-1.1.0
id: asdf://stsci.edu/datamodels/roman/schemas/SSC/MSOS/keywords/msos_pointing-1.0.0

title: GBTDS Pointing Information
extName: SSC

type: object
properties:
  ra_field_cen:
    title: GBTDS Field Center RA
    description: Right Ascension (J2000) of the GBTDS Field Center in decimal degrees.
    type: number
    archive_catalog:
      datatype: float
      destination: [WFIMSOSReferenceFrame.ra_ref]
  dec_field_cen:
    title: GBTDS Field Center Dec
    description: Declination (J2000) of the GBTDS Field Center in decimal degrees.
    type: number
    archive_catalog:
      datatype: float
      destination: [WFIMSOSReferenceFrame.dec_ref]
  ref_frame:
    title: Reference Frame
    description: The coordinate system used to define the reference frame
    type: string
    maxLength: 16
    archive_catalog:
      datatype: nvarchar(16)
      destination: [WFIMSOSReferenceFrame.reference_frame]
  equinox:
    title: Equinox
    description: The equinox of the coordinates
    type: number
    archive_catalog:
      datatype: float
      destination: [WFIMSOSReferenceFrame.equinox]

required: [ra_field_cen, dec_field_cen, ref_frame, equinox]
