%YAML 1.1
---
$schema: asdf://stsci.edu/datamodels/roman/schemas/rad_schema-1.1.0
id: asdf://stsci.edu/datamodels/roman/schemas/SSC/MSOS/keywords/msos_common-1.0.0

title: MSOS common keywords
extName: SSC
type: object
properties:
  program:
    title: Program ID
    description: ID number (integer) assigned to the RST Program. Example value '00992'.
    type: integer
    archive_catalog:
      datatype: int
      destination: [WFIMSOSReferenceFrame.program, WFIMSOSCatalog.program]
  category:
    title: Program Category
    description: |
      The submitted proposal category of the program. The
      categories include calibration (CAL), core community survey
      (CCS), coronagraph technology demonstration (CGI), observatory
      commissioning (COM), engineering (ENG), general astrophysics
      survey (GAS), general investigator (GI), and observing conducted
      at the direction of the National Aeronautics and Space
      Administration (NASA).
    type: string
    maxLength: 6
    archive_catalog:
      datatype: nvarchar(6)
      destination: [WFIMSOSReferenceFrame.category, WFIMSOSCatalog.category]
  subcategory:
    title: Program Subcategory
    description: |
      The submitted proposal subcategory of the program. The
      subcategories include calibration (CAL), coronagraph technology
      demonstration (CGI), community research programs (CR),
      discretionary research programs (DR), Galactic Bulge Time Domain
      Survey (GBTD), High-Latitude Time Domain Survey (HLTD),
      High-Latitude Wide-Area Survey (HLWA), observational research
      program (OR), Wide Field Instrument (WFI), and Wavefront Sensing
      and Control (WFSC). All subcategories belong to only a subset of
      the meta.program.category values.
    type: string
    maxLength: 15
    archive_catalog:
      datatype: nvarchar(15)
      destination:
        [
          WFIMSOSReferenceFrame.program_subcategory,
          WFIMSOSCatalog.program_subcategory,
        ]
  msos_photometry_version:
    title: Msos Photometry Software Version
    description: Version of the MSOS Photometry Software (roman-msos-photometry repo).  Example value '3.3.0'.
    type: string
    maxLength: 128
    archive_catalog:
      datatype: nvarchar(128)
      destination:
        [
          WFIMSOSReferenceFrame.msos_photometry_version,
          WFIMSOSCatalog.msos_photometry_version,
        ]
  msos_events_version:
    title: Msos Events Software Version
    description: Version of the MSOS Events Software (roman-msos-events repo).  Example value '3.3.0'.
    type: string
    maxLength: 128
    archive_catalog:
      datatype: nvarchar(128)
      destination:
        [
          WFIMSOSReferenceFrame.msos_events_version,
          WFIMSOSCatalog.msos_events_version,
        ]
  msos_detection_efficiency_version:
    title: Msos Detection Efficiency Software Version
    description: Version of the MSOS Detection Efficiency Software (roman-msos-efficiency repo). Example value '3.3.0'.
    type: string
    maxLength: 128
    archive_catalog:
      datatype: nvarchar(128)
      destination:
        [
          WFIMSOSReferenceFrame.msos_detection_efficiency_version,
          WFIMSOSCatalog.msos_detection_efficiency_version,
        ]
  msos_processing_id:
    title: ID
    description: Processing release ID (for prompt or data release type processing). Example value 'r03'.
    type: string
    maxLength: 3
    archive_catalog:
      datatype: nvarchar(3)
      destination:
        [
          WFIMSOSReferenceFrame.msos_processing_id,
          WFIMSOSCatalog.msos_processing_id,
        ]
  season:
    title: Season
    description: Season Number of the GBTDS.  Example value 's01'.
    type: string
    maxLength: 3
    archive_catalog:
      datatype: nvarchar(3)
      destination: [WFIMSOSReferenceFrame.season, WFIMSOSCatalog.season]
  flip:
    title: GBTDS Seasonal Flip Indicator
    description: Indicates the Roman footprint orientation. Example value '90'.
    type: integer
    archive_catalog:
      datatype: int
      destination: [WFIMSOSReferenceFrame.flip, WFIMSOSCatalog.flip]
  gal_cen_flag:
    title: Galactic Center Flag
    description: Indicates if data from the Galactic Center are present.
    type: boolean
    archive_catalog:
      datatype: nchar(1)
      destination:
        [WFIMSOSReferenceFrame.gal_cen_flag, WFIMSOSCatalog.gal_cen_flag]

required:
  [
    program,
    category,
    subcategory,
    msos_photometry_version,
    msos_events_version,
    msos_detection_efficiency_version,
    msos_processing_id,
    season,
    flip,
    gal_cen_flag,
  ]
