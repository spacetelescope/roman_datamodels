%YAML 1.1
---
$schema: asdf://stsci.edu/datamodels/roman/schemas/rad_schema-1.1.0
id: asdf://stsci.edu/datamodels/roman/schemas/SSC/MSOS/keywords/msos_observation-1.0.0

title: MSOS Observation Keywords
extName: SSC

type: object
properties:
  field:
    title: GBTDS Field
    description: GBTDS Field acquired during data acquisition. Example value 'f03'.
    type: string
    maxLength: 3
    archive_catalog:
      datatype: nvarchar(3)
      destination: [WFIMSOSReferenceFrame.field, WFIMSOSCatalog.field]
  detector:
    title: Detector
    description: WFI Detector during data acquisition. Example value 'wfi05'.
    allOf:
      - $ref: asdf://stsci.edu/datamodels/roman/schemas/enums/wfi_detector-1.2.0
    maxLength: 5
    archive_catalog:
      datatype: nvarchar(5)
      destination: [WFIMSOSReferenceFrame.detector, WFIMSOSCatalog.detector]
  optical_element:
    allOf:
      - $ref: asdf://stsci.edu/datamodels/roman/schemas/enums/wfi_optical_element-1.1.0
    title: Optical Element
    description:
      WFI Optical Element during data acquisition. Example value 'f087'.
      WFI Optical Elemnent for Data Acquisition
    archive_catalog:
      datatype: nvarchar(4)
      destination:
        [WFIMSOSReferenceFrame.optical_element, WFIMSOSCatalog.optical_element]
  sequence:
    title: Seuqence
    description: Periodic processing epoch. Example value 'e08'.
    type: string
    maxLength: 3
    archive_catalog:
      datatype: nvarchar(3)
      destination: [WFIMSOSReferenceFrame.sequence, WFIMSOSCatalog.sequence]
required: [field, detector, optical_element, sequence]
